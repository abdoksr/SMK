services:
  # --- Backend: FastAPI, both Finance (/api) and Organisation (/api/org) modules ---
  - type: web
    name: smk-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      # Shared Mongo cluster, two logical databases
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_NAME_ORG
        sync: false

      # Finance module (admin)
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Organisation module (architecte)
      - key: JWT_SECRET_ORG
        generateValue: true
      - key: FOUNDER_EMAIL
        sync: false
      - key: FOUNDER_PASSWORD
        sync: false
      - key: FOUNDER_NAME
        sync: false

      # The deployed frontend origin (single combined site, serves both /finance and /org)
      - key: FRONTEND_URL
        sync: false

  # --- Frontend: single React app, /finance and /org portals + landing chooser at / ---
  - type: web
    name: smk-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false   # URL of the smk-backend service above, e.g. https://smk-backend.onrender.com
    routes:
      # Client-side routing (React Router) needs every path to fall back to index.html
      - type: rewrite
        source: /*
        destination: /index.html
